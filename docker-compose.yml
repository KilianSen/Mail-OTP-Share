version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - otpshare_data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  otpshare_data:
